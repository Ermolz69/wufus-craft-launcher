name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-progress run when a new push arrives on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Incremental compilation slows CI down — disable it.
  CARGO_INCREMENTAL: 0

jobs:
  # ── Rust: fmt → clippy → test ─────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launcher/src-tauri

    steps:
      - uses: actions/checkout@v4

      # Tauri requires system libraries even for a headless compile.
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches ~/.cargo/registry, ~/.cargo/git, and target/ keyed on Cargo.lock.
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri -> target

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: test
        run: cargo test --all-features

  # ── Frontend: type-check → lint → prettier → build ────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: launcher

    steps:
      - uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: ESLint
        run: pnpm lint

      - name: Prettier
        run: pnpm format:check

      # Smoke build — confirms the project compiles end-to-end.
      - name: Build
        run: pnpm build

  # ── Gate: single status for branch protection ──────────────────────────────
  # Add this job name to Settings → Branches → required status checks.
  ci:
    name: CI
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All checks passed
        run: |
          rust="${{ needs.rust.result }}"
          frontend="${{ needs.frontend.result }}"
          echo "rust=$rust  frontend=$frontend"
          if [[ "$rust" != "success" || "$frontend" != "success" ]]; then
            exit 1
          fi
