version: "3"

vars:
  LAUNCHER_DIR: "{{.ROOT_DIR}}/launcher"
  TAURI_DIR: "{{.ROOT_DIR}}/launcher/src-tauri"

tasks:
  # ── Rust ───────────────────────────────────────────────────────────────────

  fmt:
    desc: "Format Rust code"
    dir: "{{.TAURI_DIR}}"
    cmds:
      - cargo fmt --all

  fmt:check:
    desc: "Check Rust formatting (read-only)"
    dir: "{{.TAURI_DIR}}"
    cmds:
      - cargo fmt --all -- --check

  clippy:
    desc: "Run Clippy (warnings treated as errors)"
    dir: "{{.TAURI_DIR}}"
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  test:
    desc: "Run Rust tests"
    dir: "{{.TAURI_DIR}}"
    cmds:
      - cargo test --all-features

  # ── TypeScript ─────────────────────────────────────────────────────────────

  ts:check:
    desc: "TypeScript type-check"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm type-check

  lint:
    desc: "ESLint"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm lint

  lint:fix:
    desc: "ESLint with auto-fix"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm lint:fix

  prettier:check:
    desc: "Prettier — check only"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm format:check

  prettier:fix:
    desc: "Prettier — format in place"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm format

  # ── Groups ─────────────────────────────────────────────────────────────────

  check:
    desc: "Full check: rustfmt + clippy + tsc + lint + prettier"
    cmds:
      - task: fmt:check
      - task: clippy
      - task: ts:check
      - task: lint
      - task: prettier:check

  fix:
    desc: "Auto-fix: cargo fmt + eslint --fix + prettier --write"
    cmds:
      - task: fmt
      - task: lint:fix
      - task: prettier:fix

  build:
    desc: "Build frontend"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm build

  dev:
    desc: "Frontend dev server"
    dir: "{{.LAUNCHER_DIR}}"
    cmds:
      - pnpm dev
